[build]
  command = "pnpm run build"
  publish = ".next"

[build.environment]
  NEXT_DISABLE_TURBOPACK = "1"
  NODE_VERSION = "18"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[notifications]]
  form_name = "quote"
  event = "submission_created"
  url = "https://josh.jam-bot.com/social-api/api/leads/webhook/netlify?tenant=josh&site=trafficcontrolinsurance.com"

[[notifications]]
  form_name = "contact"
  event = "submission_created"
  url = "https://josh.jam-bot.com/social-api/api/leads/webhook/netlify?tenant=josh&site=trafficcontrolinsurance.com"
